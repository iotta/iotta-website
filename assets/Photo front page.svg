<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Isometrische IoT smart building illustratie met sensoren, gateway en dataverbindingen" fill="none">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26301f" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#111510" stop-opacity="0.98"/>
      <stop offset="1" stop-color="#050706" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2d27"/>
      <stop offset="1" stop-color="#0b0d0a"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b4ff45"/>
      <stop offset="1" stop-color="#8DC63F"/>
    </linearGradient>
    <radialGradient id="softGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8DC63F" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#8DC63F" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.78  0 0 0 0 0.25  0 0 0 0.8 0" result="greenBlur"/>
      <feMerge>
        <feMergeNode in="greenBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <pattern id="windowGrid" width="56" height="48" patternUnits="userSpaceOnUse">
      <rect width="44" height="34" rx="3" fill="#1e241b" opacity="0.90"/>
      <rect x="3" y="4" width="38" height="26" rx="2" fill="#8DC63F" opacity="0.12"/>
      <line x1="22" y1="4" x2="22" y2="30" stroke="#8DC63F" stroke-opacity="0.18"/>
      <line x1="3" y1="17" x2="41" y2="17" stroke="#8DC63F" stroke-opacity="0.12"/>
    </pattern>
    <symbol id="sensorDot" viewBox="0 0 80 80">
      <circle cx="40" cy="40" r="28" fill="#071006" stroke="#8DC63F" stroke-width="3"/>
      <circle cx="40" cy="40" r="7" fill="#8DC63F" filter="url(#glow)"/>
      <path d="M25 24c8-7 22-7 30 0M30 31c6-4 14-4 20 0" stroke="#8DC63F" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    </symbol>
    <symbol id="gateway" viewBox="0 0 180 120">
      <rect x="22" y="38" width="136" height="56" rx="14" fill="#10140f" stroke="#8DC63F" stroke-width="3"/>
      <circle cx="54" cy="66" r="6" fill="#8DC63F" filter="url(#glow)"/>
      <circle cx="90" cy="66" r="6" fill="#8DC63F" opacity="0.7"/>
      <circle cx="126" cy="66" r="6" fill="#8DC63F" opacity="0.45"/>
      <path d="M52 38c22-18 54-18 76 0M66 25c14-10 34-10 48 0" stroke="#8DC63F" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    </symbol>
  </defs>

  <!-- faint anchor shadows only; no solid background -->
  <ellipse cx="735" cy="755" rx="500" ry="85" fill="#000" opacity="0.22"/>
  <ellipse cx="1160" cy="560" rx="120" ry="35" fill="url(#softGreen)" opacity="0.55"/>

  <!-- dotted data paths -->
  <g stroke="#8DC63F" stroke-width="2.5" stroke-linecap="round" opacity="0.75" filter="url(#glow)">
    <path d="M1120 500 C1015 400 920 322 765 275" stroke-dasharray="2 18"/>
    <path d="M1120 500 C980 520 860 492 713 418" stroke-dasharray="2 18"/>
    <path d="M1120 500 C934 647 694 652 500 614" stroke-dasharray="2 18"/>
    <path d="M1120 500 C1272 470 1355 388 1445 300" stroke-dasharray="2 18"/>
    <path d="M1120 500 C1262 585 1350 622 1465 650" stroke-dasharray="2 18"/>
    <path d="M1120 500 C1015 610 937 694 808 720" stroke-dasharray="2 18"/>
  </g>

  <!-- building block -->
  <g filter="url(#shadow)">
    <!-- base floor -->
    <polygon points="310,520 720,414 1045,535 622,678" fill="#121611" stroke="#2a3324" stroke-width="3"/>
    <polygon points="310,520 622,678 622,765 310,607" fill="#0b0e0b" stroke="#20271d" stroke-width="3"/>
    <polygon points="622,678 1045,535 1045,622 622,765" fill="#080a08" stroke="#20271d" stroke-width="3"/>

    <!-- second floor -->
    <polygon points="380,330 760,235 990,325 608,452" fill="url(#roof)" stroke="#30382c" stroke-width="3"/>
    <polygon points="380,330 608,452 608,570 380,450" fill="url(#glass)" stroke="#283024" stroke-width="3"/>
    <polygon points="608,452 990,325 990,445 608,570" fill="url(#glass)" stroke="#283024" stroke-width="3"/>

    <!-- ground floor façades -->
    <polygon points="360,505 620,632 620,730 360,600" fill="url(#glass)" stroke="#283024" stroke-width="3"/>
    <polygon points="620,632 1005,505 1005,596 620,730" fill="url(#glass)" stroke="#283024" stroke-width="3"/>

    <!-- window grids clipped-like as polygons approximated by internal rectangles -->
    <g opacity="0.92">
      <path d="M405 386 L570 473 L570 532 L405 445 Z" fill="url(#windowGrid)" opacity="0.75"/>
      <path d="M648 457 L933 363 L933 421 L648 516 Z" fill="url(#windowGrid)" opacity="0.75"/>
      <path d="M398 548 L582 640 L582 695 L398 603 Z" fill="url(#windowGrid)" opacity="0.72"/>
      <path d="M670 632 L960 535 L960 585 L670 690 Z" fill="url(#windowGrid)" opacity="0.72"/>
    </g>

    <!-- internal use cases: server racks, office, cooling -->
    <g stroke="#8DC63F" stroke-opacity="0.32" fill="#151a13">
      <rect x="705" y="365" width="36" height="92" rx="4" transform="rotate(-18 705 365)"/>
      <rect x="755" y="349" width="36" height="92" rx="4" transform="rotate(-18 755 349)"/>
      <rect x="804" y="333" width="36" height="92" rx="4" transform="rotate(-18 804 333)"/>
      <line x1="707" y1="396" x2="737" y2="387"/>
      <line x1="756" y1="380" x2="787" y2="371"/>
      <line x1="806" y1="364" x2="836" y2="355"/>
    </g>

    <g fill="#8DC63F" opacity="0.88" filter="url(#glow)">
      <rect x="458" y="562" width="80" height="9" rx="4" transform="rotate(26 458 562)"/>
      <rect x="510" y="587" width="90" height="9" rx="4" transform="rotate(26 510 587)"/>
      <rect x="700" y="620" width="210" height="8" rx="4" transform="rotate(-18 700 620)"/>
      <rect x="427" y="344" width="95" height="7" rx="3" transform="rotate(28 427 344)"/>
    </g>
  </g>

  <!-- outside assets -->
  <g filter="url(#shadow)">
    <!-- parking -->
    <polygon points="700,700 865,648 1022,706 855,763" fill="#111510" stroke="#8DC63F" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M748 700l153 57M808 672l154 57M866 653l154 57" stroke="#8DC63F" opacity="0.20"/>
    <g fill="#171b17" stroke="#384230" stroke-width="2">
      <path d="M780 682l62-18 40 17-64 20z"/>
      <path d="M858 710l62-18 40 17-64 20z"/>
      <path d="M750 724l62-18 40 17-64 20z"/>
    </g>

    <!-- tank -->
    <ellipse cx="210" cy="615" rx="105" ry="36" fill="#171b17" stroke="#30382c" stroke-width="3"/>
    <path d="M105 615v135c0 20 47 36 105 36s105-16 105-36V615" fill="#0d110d" stroke="#30382c" stroke-width="3"/>
    <ellipse cx="210" cy="750" rx="105" ry="36" fill="#111510" stroke="#30382c" stroke-width="3"/>
    <path d="M125 707h170" stroke="#8DC63F" stroke-opacity="0.3" stroke-width="3"/>

    <!-- waste unit -->
    <polygon points="360,735 505,690 610,735 462,788" fill="#0e120e" stroke="#30382c" stroke-width="3"/>
    <polygon points="360,735 462,788 462,830 360,777" fill="#090c09" stroke="#30382c" stroke-width="3"/>
    <polygon points="462,788 610,735 610,778 462,830" fill="#0b0f0b" stroke="#30382c" stroke-width="3"/>

    <!-- truck -->
    <polygon points="1275,655 1465,600 1540,630 1348,690" fill="#101410" stroke="#30382c" stroke-width="3"/>
    <polygon points="1275,655 1348,690 1348,745 1275,708" fill="#090b09" stroke="#30382c" stroke-width="3"/>
    <polygon points="1348,690 1540,630 1540,684 1348,745" fill="#0c100c" stroke="#30382c" stroke-width="3"/>
    <circle cx="1340" cy="742" r="15" fill="#050705" stroke="#8DC63F" stroke-opacity="0.35"/>
    <circle cx="1495" cy="692" r="15" fill="#050705" stroke="#8DC63F" stroke-opacity="0.35"/>
  </g>

  <!-- gateway hub -->
  <g transform="translate(1035 440)" filter="url(#glow)">
    <use href="#gateway" width="180" height="120"/>
  </g>

  <!-- cloud made from vector dots/outline -->
  <g transform="translate(1310 120)" filter="url(#glow)">
    <path d="M28 92h178c30 0 53-20 53-47 0-25-21-46-49-47-12-24-39-39-70-35-20 3-38 13-49 28-9-5-20-8-33-8-33 0-59 23-59 52 0 21 12 39 29 47z" fill="#071006" stroke="#8DC63F" stroke-width="4" stroke-linejoin="round"/>
    <g fill="#8DC63F" opacity="0.75">
      <circle cx="66" cy="42" r="2"/><circle cx="84" cy="50" r="2"/><circle cx="101" cy="37" r="2"/><circle cx="120" cy="54" r="2"/>
      <circle cx="139" cy="41" r="2"/><circle cx="158" cy="58" r="2"/><circle cx="176" cy="45" r="2"/><circle cx="195" cy="62" r="2"/>
      <circle cx="77" cy="66" r="2"/><circle cx="104" cy="72" r="2"/><circle cx="132" cy="70" r="2"/><circle cx="160" cy="74" r="2"/><circle cx="188" cy="75" r="2"/>
    </g>
  </g>

  <!-- sensor pins and simple icons -->
  <g filter="url(#glow)">
    <g transform="translate(685 164)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v90" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M31 41h18M40 31v18" stroke="#8DC63F" stroke-width="4" stroke-linecap="round"/></g>
    <g transform="translate(920 206)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v150" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M30 48c15-28 30-28 20 0M40 28v24" stroke="#8DC63F" stroke-width="4" stroke-linecap="round"/></g>
    <g transform="translate(490 270)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v240" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><circle cx="31" cy="45" r="7" stroke="#8DC63F" stroke-width="4"/><circle cx="49" cy="45" r="7" stroke="#8DC63F" stroke-width="4"/><path d="M22 57c6-9 30-9 36 0" stroke="#8DC63F" stroke-width="4" stroke-linecap="round"/></g>
    <g transform="translate(720 640)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v70" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M24 48h34l7-15H31zM32 48v9M55 48v9" stroke="#8DC63F" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/></g>
    <g transform="translate(158 535)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v120" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M25 48c8-19 14-19 22 0 8-19 14-19 22 0" stroke="#8DC63F" stroke-width="4" stroke-linecap="round"/></g>
    <g transform="translate(435 635)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v90" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M28 34h24l-3 28H31zM25 34h30" stroke="#8DC63F" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/></g>
    <g transform="translate(1440 560)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v92" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M40 58s18-17 18-31a18 18 0 0 0-36 0c0 14 18 31 18 31z" stroke="#8DC63F" stroke-width="4"/><circle cx="40" cy="27" r="5" fill="#8DC63F"/></g>
    <g transform="translate(1148 650)"><use href="#sensorDot" width="80" height="80"/><path d="M40 40v72" stroke="#8DC63F" stroke-width="2" stroke-dasharray="6 8"/><path d="M40 24l17 9v15c0 14-9 23-17 28-8-5-17-14-17-28V33z" stroke="#8DC63F" stroke-width="4" stroke-linejoin="round"/><circle cx="40" cy="45" r="6" fill="#8DC63F"/></g>
  </g>

  <!-- clean outer composition highlight -->
  <g opacity="0.45" filter="url(#glow)">
    <path d="M342 820 C526 876 888 865 1056 782" stroke="#8DC63F" stroke-width="2" stroke-dasharray="5 14"/>
    <path d="M103 776 C330 884 812 884 1060 774" stroke="#8DC63F" stroke-width="1.5" stroke-dasharray="4 16" opacity="0.45"/>
  </g>
</svg>
