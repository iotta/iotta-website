<svg viewBox="0 0 520 440" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" role="img">

  <!-- Building body -->
  <rect x="150" y="80" width="220" height="290" rx="3" fill="#161616" stroke="#282828" stroke-width="1.5"/>

  <!-- Floor lines -->
  <line x1="150" y1="138" x2="370" y2="138" stroke="#202020" stroke-width="1"/>
  <line x1="150" y1="196" x2="370" y2="196" stroke="#202020" stroke-width="1"/>
  <line x1="150" y1="254" x2="370" y2="254" stroke="#202020" stroke-width="1"/>
  <line x1="150" y1="312" x2="370" y2="312" stroke="#202020" stroke-width="1"/>

  <!-- Windows — floor 1 -->
  <rect x="170" y="96"  width="32" height="24" rx="2" fill="#8DC63F" opacity="0.8"/>
  <rect x="218" y="96"  width="32" height="24" rx="2" fill="#222"/>
  <rect x="266" y="96"  width="32" height="24" rx="2" fill="#8DC63F" opacity="0.35"/>
  <rect x="314" y="96"  width="32" height="24" rx="2" fill="#8DC63F" opacity="0.15"/>

  <!-- Windows — floor 2 -->
  <rect x="170" y="152" width="32" height="24" rx="2" fill="#222"/>
  <rect x="218" y="152" width="32" height="24" rx="2" fill="#8DC63F" opacity="0.9"/>
  <rect x="266" y="152" width="32" height="24" rx="2" fill="#222"/>
  <rect x="314" y="152" width="32" height="24" rx="2" fill="#8DC63F" opacity="0.55"/>

  <!-- Windows — floor 3 -->
  <rect x="170" y="210" width="32" height="24" rx="2" fill="#8DC63F" opacity="0.4"/>
  <rect x="218" y="210" width="32" height="24" rx="2" fill="#222"/>
  <rect x="266" y="210" width="32" height="24" rx="2" fill="#8DC63F" opacity="0.85"/>
  <rect x="314" y="210" width="32" height="24" rx="2" fill="#222"/>

  <!-- Windows — floor 4 -->
  <rect x="170" y="268" width="32" height="24" rx="2" fill="#222"/>
  <rect x="218" y="268" width="32" height="24" rx="2" fill="#8DC63F" opacity="0.6"/>
  <rect x="266" y="268" width="32" height="24" rx="2" fill="#222"/>
  <rect x="314" y="268" width="32" height="24" rx="2" fill="#8DC63F" opacity="0.45"/>

  <!-- Ground floor door -->
  <rect x="228" y="320" width="64" height="50" rx="2" fill="#1a1a1a"/>
  <line x1="260" y1="320" x2="260" y2="370" stroke="#252525" stroke-width="1"/>

  <!-- Dashed data lines — sensors to gateway -->
  <line x1="100" y1="125" x2="196" y2="388" stroke="#8DC63F" stroke-width="0.8" stroke-dasharray="4,5" opacity="0.25"/>
  <line x1="260" y1="52"  x2="260" y2="385" stroke="#8DC63F" stroke-width="0.8" stroke-dasharray="4,5" opacity="0.25"/>
  <line x1="420" y1="170" x2="324" y2="388" stroke="#8DC63F" stroke-width="0.8" stroke-dasharray="4,5" opacity="0.25"/>

  <!-- Sensor 1 — left wall -->
  <circle cx="100" cy="125" r="5.5" fill="#8DC63F"/>
  <circle cx="100" cy="125" r="8" stroke="#8DC63F" stroke-width="1.5" fill="none" opacity="0.55" class="pulse d1"/>
  <circle cx="100" cy="125" r="8" stroke="#8DC63F" stroke-width="1" fill="none" opacity="0.3" class="pulse d2"/>
  <line x1="106" y1="125" x2="150" y2="125" stroke="#8DC63F" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Sensor 2 — rooftop -->
  <circle cx="260" cy="52" r="5.5" fill="#8DC63F"/>
  <circle cx="260" cy="52" r="8" stroke="#8DC63F" stroke-width="1.5" fill="none" opacity="0.55" class="pulse d3"/>
  <circle cx="260" cy="52" r="8" stroke="#8DC63F" stroke-width="1" fill="none" opacity="0.3" class="pulse d4"/>
  <line x1="260" y1="58" x2="260" y2="80" stroke="#8DC63F" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Sensor 3 — right wall -->
  <circle cx="420" cy="170" r="5.5" fill="#8DC63F"/>
  <circle cx="420" cy="170" r="8" stroke="#8DC63F" stroke-width="1.5" fill="none" opacity="0.55" class="pulse d5"/>
  <circle cx="420" cy="170" r="8" stroke="#8DC63F" stroke-width="1" fill="none" opacity="0.3" class="pulse d6"/>
  <line x1="414" y1="170" x2="370" y2="170" stroke="#8DC63F" stroke-width="0.9" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Gateway box -->
  <rect x="200" y="385" width="120" height="30" rx="5" fill="#0d0d0d" stroke="#8DC63F" stroke-width="1"/>
  <text x="260" y="404" text-anchor="middle" fill="#8DC63F" font-size="8.5" font-weight="700"
        font-family="Inter, sans-serif" letter-spacing="2.5">GATEWAY</text>

  <!-- Cloud shape -->
  <path d="M468 70 Q462 57 449 61 Q446 48 432 52 Q429 40 417 47
           Q411 40 408 47 Q398 43 398 56 Q395 66 405 70 L468 70
           Q476 70 476 62 Q476 54 468 70Z"
        fill="#161616" stroke="#8DC63F" stroke-width="1" opacity="0.9"/>

  <!-- Cloud wifi dots -->
  <circle cx="431" cy="61" r="2" fill="#8DC63F" opacity="0.7"/>
  <circle cx="443" cy="57" r="2" fill="#8DC63F" opacity="0.5"/>
  <circle cx="455" cy="60" r="2" fill="#8DC63F" opacity="0.7"/>

  <!-- Gateway to cloud line -->
  <line x1="320" y1="385" x2="438" y2="70" stroke="#8DC63F" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.2"/>

  <!-- Data label -->
  <text x="260" y="428" text-anchor="middle" fill="#8DC63F" font-size="7" font-weight="700"
        font-family="Inter, sans-serif" letter-spacing="3" opacity="0.5">REALTIME · DRAADLOOS</text>

</svg>
